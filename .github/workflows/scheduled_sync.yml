# Follow Changes of Forked/Upstream Repository.
#

name: Merge upstream branches

# Triggers the action as scheduled
on:
  # Runs on 10 minutes past every hour
  #schedule:
  #   Ref:
  #   - https://help.github.com/en/actions/reference/events-that-trigger-workflows#scheduled-events-schedule
  #   - https://crontab.guru/examples.html
  #   Cron format:
  #         тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА minute (0 - 59)
  #         тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА hour (0 - 23)
  #         тФВ тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА day of the month (1 - 31)
  #         тФВ тФВ тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА month (1 - 12 or JAN-DEC)
  #         тФВ тФВ тФВ тФВ тФМтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА day of the week (0 - 6 or SUN-SAT)
  #         тФВ тФВ тФВ тФВ тФВ
  #         тФВ тФВ тФВ тФВ тФВ
  #         тФВ тФВ тФВ тФВ тФВ
  #         * * * * *
  #- cron: '10 */1 * * *'

  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version:
          - 3.8
    env:
      OS: ubuntu-latest
      PYTHON: ${{ matrix.python-version }}
      NAME: GitHub Action
      EMAIL: action@github.com
      REPO_FORK: https://github.com/naa0yama/pythonboilerplate.git
      BRUNCH_NAME: upstream-config-merge
      SOURCE_DIR_NAME: upstream

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2.2.1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python
        id: python_cache_id
        uses: actions/cache@v2
        with:
          path: ${{ env.pythonLocation }}
          key: python-${{ env.pythonLocation }}-v${{ matrix.python-version }}-deps-${{ hashFiles(format('{0}{1}', github.workspace, '/.github/workflows/projmr/poetry.lock')) }}

      - name: Install requirements
        if: steps.python_cache_id.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}/.github/workflows/projmr
          pip install .

      - name: git clone upstream
        run: |
          set -x

          git config --global user.name "${NAME}"
          git config --global user.email "${EMAIL}"

          # Pass the --rebase-merges option to git rebase by default
          git config --global pull.rebase merges

          # "git checkout master" is unnecessary, already here by default
          git pull --unshallow  # this option is very important, you would get
                                # complains about unrelated histories without it.
                                # (but actions/checkout@v2 can also be instructed
                                # to fetch all git depth right from the start)

          # Add the repo which you forked to the remote and name it as "upstream"
          git fetch -v
          git clone "${REPO_FORK}" "./${SOURCE_DIR_NAME}"

      - name: pyproject.toml merge generate
        run: |
          set -x
          projmrcli "./${SOURCE_DIR_NAME}/pyproject.toml"

      - name: commit & push
        run: |
          set -x


          if test -e ".git/refs/remotes/origin/${BRUNCH_NAME}"
          then
            git checkout -b "${BRUNCH_NAME}" "origin/${BRUNCH_NAME}"
          else
            git checkout -b "${BRUNCH_NAME}"
          fi

          SYNC_FILES_OR_DIRS=(
            ".github"
            ".vscode"
            "pyproject.toml"
            "renovate.json"
            "setup.cfg"
            "tox.ini"
          )

          for add_path in ${SYNC_FILES_OR_DIRS[@]}
          do
            if test "pyproject.toml" != "${add_path}"
            then
              cp -av "./${SOURCE_DIR_NAME}/${add_path}" "${add_path}"
            fi

            git add --intent-to-add "${add_path}"
          done

          if ! git diff --exit-code --quiet
          then
            for add_path in ${SYNC_FILES_OR_DIRS[@]}
            do
              git add "${add_path}"
              git commit -m "Config update file: ${add_path}"
            done

            git push -u origin "${BRUNCH_NAME}"
          fi

          rm -rfv "./${SOURCE_DIR_NAME}"

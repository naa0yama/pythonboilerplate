>>>>>>> main:.github/workflows/scheduled_sync.yml

      - name: Install requirements
        if: steps.python_cache_id.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}/.github/workflows/projmr
          pip install .

      - name: git clone upstream
        run: |
          set -x

          git config --global user.name "${NAME}"
          git config --global user.email "${EMAIL}"

          # Pass the --rebase-merges option to git rebase by default
          git config --global pull.rebase merges

          # "git checkout master" is unnecessary, already here by default
          git pull --unshallow  # this option is very important, you would get
                                # complains about unrelated histories without it.
                                # (but actions/checkout@v2 can also be instructed
                                # to fetch all git depth right from the start)

          # Add the repo which you forked to the remote and name it as "upstream"
          git clone ${REPO_FORK} ./upstream

      - name: pyproject.toml merge generate
        run: |
          projmrcli ./upstream/pyproject.toml pyproject.toml

      - name: commit & push
        run: |
          set -x

          git checkout -b upstream-config-merge
          git add -N pyproject.toml # 新規ファイルを含める
          if ! git diff --exit-code --quiet
          then
            git add pyproject.toml
            git commit -m "Update"
            git push -u origin upstream-config-merge
          fi
